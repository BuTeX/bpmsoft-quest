name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bpmsoft_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bpmsoft_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bpmsoft_test
      PGSSLMODE: disable

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit, API and PostgreSQL tests
        run: npm test
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Critical browser E2E
        run: npm run test:e2e
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
